name: CI

permissions:
  contents: read

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed files
    runs-on: ubuntu-slim
    timeout-minutes: 2
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      man: ${{ steps.filter.outputs.man }}
      python: ${{ steps.filter.outputs.python }}
      bash: ${{ steps.filter.outputs.bash }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - id: filter
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.event.after }}
        run: |
          set -euo pipefail

          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            {
              echo "rust=true"
              echo "man=true"
              echo "python=true"
              echo "bash=true"
              echo "workflows=true"
            } >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            FILES=$(git diff --name-only "${BASE_SHA}" "${HEAD_SHA}")
          else
            FILES=$(git diff --name-only "${BEFORE_SHA}" "${AFTER_SHA}")
          fi

          if echo "${FILES}" | grep -qE '\.rs$|Cargo\.toml$|Cargo\.lock$|rust-toolchain\.toml$|^\.github/workflows/rust\.yml$'; then
            echo "rust=true" >> "${GITHUB_OUTPUT}"
          fi

          if echo "${FILES}" | grep -qE '^man/|^Makefile$|^\.github/workflows/man\.yml$'; then
            echo "man=true" >> "${GITHUB_OUTPUT}"
          fi

          if echo "${FILES}" | grep -qE '\.py$|^\.github/workflows/python\.yml$'; then
            echo "python=true" >> "${GITHUB_OUTPUT}"
          fi

          if echo "${FILES}" | grep -qE '\.sh$|^\.github/workflows/bash\.yml$'; then
            echo "bash=true" >> "${GITHUB_OUTPUT}"
          fi

          if echo "${FILES}" | grep -qE '^\.github/'; then
            echo "workflows=true" >> "${GITHUB_OUTPUT}"
          fi

  rust:
    name: Rust
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    uses: ./.github/workflows/rust.yml

  man:
    name: Man pages
    needs: changes
    if: needs.changes.outputs.man == 'true'
    uses: ./.github/workflows/man.yml

  python:
    name: Python
    needs: changes
    if: needs.changes.outputs.python == 'true'
    uses: ./.github/workflows/python.yml

  bash:
    name: Bash
    needs: changes
    if: needs.changes.outputs.bash == 'true'
    uses: ./.github/workflows/bash.yml

  validate-workflows:
    name: Validate workflows
    needs: changes
    if: needs.changes.outputs.workflows == 'true'
    uses: ./.github/workflows/validate-github-workflows.yml
