name: Man Pages
permissions:
  contents: read
on:
  pull_request:
    paths:
      - "man/**"
      - "Makefile"
      - ".github/workflows/man.yml"
  push:
    branches: [main]
    paths:
      - "man/**"
      - "Makefile"
      - ".github/workflows/man.yml"
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install scdoc
        run: |
          sudo apt-get update
          sudo apt-get install -y scdoc
      - name: Build man pages
        run: make man
